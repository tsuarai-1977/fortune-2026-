<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 2026年総合占い 🔮</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

:root {
  --pink: #ff6b9d;
  --pink-light: #ffc2d4;
  --lavender: #c8a2f8;
  --lavender-light: #e8d5ff;
  --mint: #7dd3c0;
  --mint-light: #c5f0e5;
  --yellow: #ffd166;
  --yellow-light: #fff0c2;
  --blue: #73b4ff;
  --blue-light: #c2dfff;
  --coral: #ff8a80;
  --bg: #fef6ff;
  --card-bg: rgba(255,255,255,0.92);
  --text: #4a3860;
  --text-light: #8a7a9a;
  --shadow: 0 8px 32px rgba(180,140,220,0.18);
  --radius: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', 'BIZ UDGothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background decorations */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(200,162,248,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255,107,157,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(125,211,192,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 10% 70%, rgba(255,209,102,0.1) 0%, transparent 50%);
  z-index: -1;
  animation: bgFloat 20s ease-in-out infinite;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, -1%) rotate(1deg); }
  66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
}

/* Floating stars */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
  overflow: hidden;
}
.star {
  position: absolute;
  font-size: 20px;
  opacity: 0.3;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 0.5; transform: scale(1.2); }
}

/* Header */
.header {
  text-align: center;
  padding: 30px 20px 20px;
  position: relative;
}
.header h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--pink), var(--lavender), var(--pink));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 4s ease-in-out infinite;
  margin-bottom: 8px;
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.header p {
  color: var(--text-light);
  font-size: 0.95rem;
}

/* Container */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

/* Input form */
.input-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 30px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(200,162,248,0.2);
  margin-bottom: 24px;
  position: relative;
  overflow: visible;
}
.input-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  border-radius: var(--radius) var(--radius) 0 0;
  background: linear-gradient(90deg, var(--pink), var(--lavender), var(--mint), var(--yellow), var(--pink));
  background-size: 200% 100%;
  animation: gradientShift 3s linear infinite;
}
.input-card h2 {
  font-size: 1.3rem;
  margin-bottom: 20px;
  text-align: center;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group label {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--lavender);
  display: flex;
  align-items: center;
  gap: 4px;
}
.form-group input, .form-group select {
  padding: 12px 16px;
  border: 2px solid var(--lavender-light);
  border-radius: 14px;
  font-family: inherit;
  font-size: 1rem;
  color: var(--text);
  background: rgba(255,255,255,0.8);
  transition: all 0.3s;
  outline: none;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--lavender);
  box-shadow: 0 0 0 4px rgba(200,162,248,0.15);
}

.btn-fortune {
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 0 auto;
  padding: 16px 32px;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  color: white;
  border: none;
  border-radius: 50px;
  font-family: inherit;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 20px rgba(255,107,157,0.35);
  position: relative;
  overflow: hidden;
}
.btn-fortune:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(255,107,157,0.45);
}
.btn-fortune:active {
  transform: translateY(0);
}
.btn-fortune::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(transparent, rgba(255,255,255,0.15), transparent);
  transform: rotate(45deg);
  animation: btnShine 3s ease-in-out infinite;
}
@keyframes btnShine {
  0% { transform: translateX(-100%) rotate(45deg); }
  30%, 100% { transform: translateX(100%) rotate(45deg); }
}

/* Loading */
.loading {
  display: none;
  text-align: center;
  padding: 60px 20px;
}
.loading.active { display: block; }
.loading-crystal {
  font-size: 80px;
  animation: crystalFloat 2s ease-in-out infinite;
  display: inline-block;
}
@keyframes crystalFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}
.loading p {
  margin-top: 16px;
  color: var(--lavender);
  font-weight: 700;
  font-size: 1.1rem;
  animation: dots 1.5s infinite;
}
@keyframes dots {
  0% { content: '.'; }
  33% { content: '..'; }
  66% { content: '...'; }
}

/* Results */
#results { display: none; }
#results.active { display: block; }

/* Profile summary */
.profile-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(200,162,248,0.2);
  margin-bottom: 24px;
  text-align: center;
}
.profile-card h2 {
  font-size: 1.2rem;
  margin-bottom: 16px;
  color: var(--pink);
}
.profile-badges {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 700;
}
.badge-pink { background: var(--pink-light); color: #c0406a; }
.badge-lavender { background: var(--lavender-light); color: #7a52b8; }
.badge-mint { background: var(--mint-light); color: #3a9080; }
.badge-yellow { background: var(--yellow-light); color: #b89030; }
.badge-blue { background: var(--blue-light); color: #3070c0; }
.badge-gold { background: linear-gradient(135deg, #fff0c2, #ffd166); color: #8a6d20; }
.badge-purple { background: linear-gradient(135deg, #e8d5ff, #d8b4fe); color: #6b21a8; }

.form-hint {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-top: 2px;
}

/* Time period tabs */
.period-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px;
  margin-bottom: 24px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.period-tabs::-webkit-scrollbar { display: none; }
.period-tab {
  flex-shrink: 0;
  padding: 10px 20px;
  border: 2px solid var(--lavender-light);
  border-radius: 50px;
  background: white;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}
.period-tab:hover {
  border-color: var(--lavender);
  color: var(--lavender);
}
.period-tab.active {
  background: linear-gradient(135deg, var(--lavender), var(--pink));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 15px rgba(200,162,248,0.3);
}

/* Period panel */
.period-panel { display: none; }
.period-panel.active { display: block; }

/* Fortune category cards */
.fortune-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.fortune-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(200,162,248,0.15);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.fortune-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(180,140,220,0.25);
}
.fortune-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.fortune-icon {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.fortune-card-header h3 {
  font-size: 1rem;
  font-weight: 700;
}

/* Score bar */
.score-section {
  margin-bottom: 12px;
}
.score-bar-bg {
  width: 100%;
  height: 10px;
  background: #f0e8f5;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.score-bar-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 1s ease-out;
  position: relative;
}
.score-bar-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: barShimmer 2s infinite;
}
@keyframes barShimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.score-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.score-num {
  font-weight: 900;
  font-size: 1.4rem;
}
.score-stars {
  font-size: 0.9rem;
  letter-spacing: 2px;
}

.fortune-text {
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--text);
}

/* Lucky section */
.lucky-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(200,162,248,0.2);
  margin-bottom: 24px;
}
.lucky-card h2 {
  font-size: 1.15rem;
  margin-bottom: 16px;
  text-align: center;
  color: var(--pink);
}
.lucky-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
}
.lucky-item {
  text-align: center;
  padding: 16px 12px;
  border-radius: 16px;
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(200,162,248,0.1);
}
.lucky-item .lucky-emoji {
  font-size: 32px;
  margin-bottom: 8px;
  display: block;
}
.lucky-item .lucky-label {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-bottom: 4px;
}
.lucky-item .lucky-value {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text);
}

/* Advice card */
.advice-card {
  background: linear-gradient(135deg, rgba(255,107,157,0.08), rgba(200,162,248,0.08), rgba(125,211,192,0.08));
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(200,162,248,0.2);
  margin-bottom: 24px;
}
.advice-card h2 {
  font-size: 1.15rem;
  margin-bottom: 16px;
  text-align: center;
}
.advice-text {
  font-size: 0.95rem;
  line-height: 1.8;
  text-align: center;
  color: var(--text);
  padding: 0 10px;
}

/* Color swatch */
.color-swatch {
  display: inline-block;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 6px;
  border: 2px solid rgba(255,255,255,0.8);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Radar chart */
.chart-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(200,162,248,0.2);
  margin-bottom: 24px;
  text-align: center;
}
.chart-card h2 {
  font-size: 1.15rem;
  margin-bottom: 16px;
  color: var(--lavender);
}
.radar-container {
  max-width: 360px;
  margin: 0 auto;
}
canvas { max-width: 100%; }

/* Systems detail */
.systems-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(200,162,248,0.2);
  margin-bottom: 24px;
}
.systems-card h2 {
  font-size: 1.15rem;
  margin-bottom: 16px;
  text-align: center;
  color: var(--mint);
}
.system-item {
  padding: 14px 0;
  border-bottom: 1px solid rgba(200,162,248,0.1);
}
.system-item:last-child { border-bottom: none; }
.system-item h4 {
  font-size: 0.95rem;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.system-item p {
  font-size: 0.85rem;
  color: var(--text-light);
  line-height: 1.6;
}

/* Reset button */
.btn-reset {
  display: block;
  width: 200px;
  margin: 30px auto;
  padding: 14px 24px;
  background: white;
  border: 2px solid var(--lavender-light);
  border-radius: 50px;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  color: var(--lavender);
  cursor: pointer;
  transition: all 0.3s;
}
.btn-reset:hover {
  border-color: var(--lavender);
  background: var(--lavender-light);
}

/* Footer */
.footer {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-light);
  font-size: 0.8rem;
}

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 1.6rem; }
  .input-card { padding: 20px; }
  .form-grid { grid-template-columns: 1fr; }
  .fortune-grid { grid-template-columns: 1fr; }
  .period-tab { padding: 8px 14px; font-size: 0.82rem; }
  .lucky-grid { grid-template-columns: repeat(2, 1fr); }
}

/* Animations */
.fade-in {
  animation: fadeIn 0.6s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.fortune-card { animation: cardIn 0.5s ease-out both; }
.fortune-card:nth-child(1) { animation-delay: 0.05s; }
.fortune-card:nth-child(2) { animation-delay: 0.1s; }
.fortune-card:nth-child(3) { animation-delay: 0.15s; }
.fortune-card:nth-child(4) { animation-delay: 0.2s; }
.fortune-card:nth-child(5) { animation-delay: 0.25s; }
.fortune-card:nth-child(6) { animation-delay: 0.3s; }
.fortune-card:nth-child(7) { animation-delay: 0.35s; }
.fortune-card:nth-child(8) { animation-delay: 0.4s; }
.fortune-card:nth-child(9) { animation-delay: 0.45s; }
.fortune-card:nth-child(10) { animation-delay: 0.5s; }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ==================== Quick Fortune (30秒占い) ==================== */
.quick-fortune {
  background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(254,246,255,0.95));
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 2px dashed var(--lavender);
  margin-bottom: 24px;
  text-align: center;
  position: relative;
  overflow: visible;
}
.quick-fortune h2 { font-size: 1.3rem; color: var(--text); margin-bottom: 6px; }
.quick-fortune .quick-sub { font-size: 0.85rem; color: var(--text-light); margin-bottom: 16px; }
.quick-fortune-input {
  display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap;
}
.quick-fortune-input input[type="date"] {
  padding: 10px 16px; border-radius: 50px; border: 2px solid var(--lavender-light);
  font-family: inherit; font-size: 1rem; color: var(--text); background: #fff;
  outline: none; transition: border-color 0.3s;
}
.quick-fortune-input input[type="date"]:focus { border-color: var(--lavender); }
.btn-quick {
  padding: 10px 24px; border-radius: 50px; border: none; cursor: pointer;
  font-family: inherit; font-size: 0.95rem; font-weight: 700;
  background: linear-gradient(135deg, var(--mint), var(--blue));
  color: #fff; transition: transform 0.2s, box-shadow 0.2s;
}
.btn-quick:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(125,211,192,0.4); }
.quick-result {
  display: none; margin-top: 20px; padding: 20px; border-radius: 16px;
  background: linear-gradient(135deg, rgba(200,162,248,0.08), rgba(125,211,192,0.08));
}
.quick-result.active { display: block; animation: fadeInUp 0.5s ease; }
.quick-result-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;
}
.quick-result-item {
  background: #fff; border-radius: 12px; padding: 14px 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.quick-result-item .qr-label { font-size: 0.75rem; color: var(--text-light); margin-bottom: 4px; }
.quick-result-item .qr-value { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.quick-result-item .qr-emoji { font-size: 1.5rem; margin-bottom: 4px; }
.quick-fortune-text {
  font-size: 1rem; line-height: 1.7; color: var(--text); margin-bottom: 16px;
  padding: 12px; background: rgba(255,255,255,0.8); border-radius: 12px;
  border-left: 4px solid var(--lavender);
}
.btn-full {
  display: inline-block; padding: 10px 28px; border-radius: 50px; border: none; cursor: pointer;
  font-family: inherit; font-size: 0.9rem; font-weight: 700;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  color: #fff; text-decoration: none; transition: transform 0.2s;
}
.btn-full:hover { transform: scale(1.05); }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ==================== SNS Share Button ==================== */
.share-section { text-align: center; margin: 24px 0; }
.btn-share-x {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border-radius: 50px; border: none; cursor: pointer;
  font-family: inherit; font-size: 0.95rem; font-weight: 700;
  background: #000; color: #fff; transition: transform 0.2s, box-shadow 0.2s;
}
.btn-share-x:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.btn-share-x svg { width: 18px; height: 18px; fill: #fff; }

/* ==================== Star Particle Animation ==================== */
.particle-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9999; overflow: hidden;
}
.particle {
  position: absolute; top: -50px;
  animation: particleFall linear forwards;
  font-size: 20px; opacity: 0.9;
}
@keyframes particleFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  70% { opacity: 0.8; }
  100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ==================== Card Flip Animation ==================== */
.fortune-card {
  perspective: 1000px;
}
.fortune-card.flip-in {
  animation: cardFlipIn 0.6s ease forwards;
}
@keyframes cardFlipIn {
  0% { transform: perspective(1000px) rotateY(-90deg); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: perspective(1000px) rotateY(0deg); opacity: 1; }
}

/* ==================== Crystal Glow Animation ==================== */
.loading .loading-crystal {
  animation: crystalFloat 2s ease-in-out infinite, crystalGlow 1.2s ease-in-out infinite alternate;
}

function hashStr(str) {

  for (let i = 0; i < str.length; i++) {

  return Math.abs(hash);
}

  ];
  // Formula: sum of digits of year, subtract from 11, mod 9

// Rokuseisennjutsu (六星占術) - Simplified
function getRokusei(year, month, day) {
  const types = ['土星人','金星人','火星人','天王星人','木星人','水星人'];
  const polarity = ['(+)', '(-)'];
  const baseDate = new Date(1900, 0, 1);
  const targetDate = new Date(year, month - 1, day);
  const diffDays = Math.floor((targetDate - baseDate) / 86400000);
  return types[Math.abs(diffDays) % 6] + polarity[Math.abs(diffDays + year) % 2];
}

// Kabbalistic Numerology (カバラ数秘術)
function getKabbalahNumerology(name) {
  if (!name || name.trim() === '') return null;

  const letterValues = {
    A:1, B:2, C:3, D:4, E:5, F:6, G:7, H:8, I:9,
    J:1, K:2, L:3, M:4, N:5, O:6, P:7, Q:8, R:9,
    S:1, T:2, U:3, V:4, W:5, X:6, Y:7, Z:8
  };
  const vowels = new Set(['A','E','I','O','U']);

  function reduceToSingle(num) {
    while (num > 9 && num !== 11 && num !== 22 && num !== 33) {
      let sum = 0;
      String(num).split('').forEach(d => sum += parseInt(d));
      num = sum;
    }
    return num;
  }

  const cleanName = name.toUpperCase().replace(/[^A-Z]/g, '');
  if (cleanName.length === 0) return null;

  let fullSum = 0, vowelSum = 0, consonantSum = 0;
  for (const ch of cleanName) {
    const val = letterValues[ch] || 0;
    fullSum += val;
    if (vowels.has(ch)) vowelSum += val;
    else consonantSum += val;
  }

  const expression = reduceToSingle(fullSum);
  const soulUrge = reduceToSingle(vowelSum);
  const personality = reduceToSingle(consonantSum);

  const meanings = {
    1: { keyword: '開拓者', trait: '独立心が強く、リーダーシップを発揮する先駆者' },
    2: { keyword: '調停者', trait: '協調性に富み、人と人を繋ぐ架け橋となる存在' },
    3: { keyword: '表現者', trait: '創造力と表現力で周囲を魅了するアーティスト' },
    4: { keyword: '建設者', trait: '安定と秩序を生み出す堅実な実力者' },
    5: { keyword: '冒険家', trait: '変化を恐れず、自由を追い求める旅人' },
    6: { keyword: '奉仕者', trait: '愛と調和で人々を癒し、守る存在' },
    7: { keyword: '探求者', trait: '深い知性と精神性で真理を追い求める賢者' },
    8: { keyword: '達成者', trait: '目標に向かって力強く突き進むパワーの持ち主' },
    9: { keyword: '博愛者', trait: '広い視野と慈愛で世界を照らす人道主義者' },
    11: { keyword: '霊感者', trait: '直感力に優れ、精神世界と現実を繋ぐマスターナンバー' },
    22: { keyword: '大建築家', trait: '壮大なビジョンを現実にするマスターナンバー' },
    33: { keyword: '大教師', trait: '無条件の愛で人々を導く最高のマスターナンバー' },
  };

  return {
    expression: { number: expression, ...(meanings[expression] || meanings[9]) },
    soulUrge: { number: soulUrge, ...(meanings[soulUrge] || meanings[9]) },
    personality: { number: personality, ...(meanings[personality] || meanings[9]) },
    nameUsed: cleanName,
  };
}

// ==================== Radar Chart ====================
function drawRadarChart(canvas, scores) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;
  const r = Math.min(w, h) / 2 - 50;
  const n = CATEGORIES.length;

  ctx.clearRect(0, 0, w, h);

  // Draw grid
  for (let level = 1; level <= 5; level++) {
    const lr = r * level / 5;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = cx + lr * Math.cos(angle);
      const y = cy + lr * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(200,162,248,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw axes
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.strokeStyle = 'rgba(200,162,248,0.15)';
    ctx.stroke();
  }

  // Draw data
  const grad = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
  grad.addColorStop(0, 'rgba(255,107,157,0.3)');
  grad.addColorStop(0.5, 'rgba(200,162,248,0.3)');
  grad.addColorStop(1, 'rgba(125,211,192,0.3)');

  ctx.beginPath();
  CATEGORIES.forEach((cat, i) => {
    const score = scores[cat.key] || 50;
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const dr = r * score / 100;
    const x = cx + dr * Math.cos(angle);
    const y = cy + dr * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,162,248,0.8)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Draw dots and labels
  CATEGORIES.forEach((cat, i) => {
    const score = scores[cat.key] || 50;
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const dr = r * score / 100;
    const x = cx + dr * Math.cos(angle);
    const y = cy + dr * Math.sin(angle);

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = cat.color;
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    const lx = cx + (r + 30) * Math.cos(angle);
    const ly = cy + (r + 30) * Math.sin(angle);
    ctx.fillStyle = '#4a3860';
    ctx.font = '12px "Zen Maru Gothic", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${cat.icon}${cat.name}`, lx, ly);
  });
}

function showResults(year, month, day, bloodType, gender, systems) {
  const results = document.getElementById('results');
  results.classList.add('active');

  // Profile card
  renderProfile(systems, bloodType, gender);

  // Generate and show fortunes for all periods
  const now = new Date();
  const periodData = {};

  PERIODS.forEach(period => {
    let seedExtra = '';
    if (period.key === 'year') seedExtra = '2026';
    else if (period.key === 'month') seedExtra = `2026-${now.getMonth() + 1}`;
    else if (period.key === 'week') seedExtra = `2026-W${getWeekNumber(now)}`;
    else if (period.key === 'day') seedExtra = `2026-${now.getMonth()+1}-${now.getDate()}`;
    else seedExtra = `2026-${now.getMonth()+1}-${now.getDate()}-special`;

    const seed = hashStr(`${year}-${month}-${day}-${bloodType}-${period.key}-${seedExtra}`);
    const rng = seededRandom(seed);

    // Base scores influenced by systems
    const zodiacBonus = hashStr(systems.zodiac.name + seedExtra) % 15;
    const nineStarBonus = hashStr(systems.nineStar.name + seedExtra) % 12;
    const animalBonus = hashStr(systems.animal.name + seedExtra) % 10;
    const mikkyoBonus = hashStr(systems.mikkyo.mansion.name + seedExtra) % 10;
    const kabbalahBonus = systems.kabbalah ? hashStr(String(systems.kabbalah.expression.number) + seedExtra) % 8 : 0;
    const baseScore = 50 + (zodiacBonus + nineStarBonus + animalBonus + mikkyoBonus + kabbalahBonus) / 5;

    const scores = {};
    const texts = {};
    CATEGORIES.forEach(cat => {
      const catSeed = hashStr(`${cat.key}-${seedExtra}-${year}${month}${day}`);
      const catRng = seededRandom(catSeed);
      scores[cat.key] = generateScore(catRng, baseScore + Math.floor(rng() * 15) - 7);
      texts[cat.key] = generateFortuneText(catRng, cat.key, scores[cat.key], period.key, systems);
    });

    const luckySeed = hashStr(`lucky-${seedExtra}-${year}${month}${day}`);
    const luckyRng = seededRandom(luckySeed);
    const lucky = generateLucky(luckyRng, systems);

    const adviceSeed = hashStr(`advice-${seedExtra}-${year}${month}${day}`);
    const adviceRng = seededRandom(adviceSeed);
    const advice = generateAdvice(adviceRng, systems, lucky, scores);

    periodData[period.key] = { scores, texts, lucky, advice };

    // Generate special content for today_special
    if (period.key === 'today_special') {
      const specialSeed = hashStr(`special-guardian-${seedExtra}-${year}${month}${day}`);
      const specialRng = seededRandom(specialSeed);
      periodData[period.key].special = generateTodaySpecial(specialRng, systems);
    }
  });

  currentData = { systems, periodData };

  // Render period panels
  renderPeriodPanels(periodData, systems);

  // Render systems detail
  renderSystems(systems);

  // Draw radar chart for active period
  const activeScores = periodData['year'].scores;
  drawRadarChart(document.getElementById('radarChart'), activeScores);

  // Tab switching
  document.querySelectorAll('.period-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      document.getElementById(`panel-${period}`).classList.add('active');
      drawRadarChart(document.getElementById('radarChart'), periodData[period].scores);
    });
  });

  results.scrollIntoView({ behavior: 'smooth' });
}

function getStars(score) {
  const full = Math.floor(score / 20);
  const half = score % 20 >= 10 ? 1 : 0;
  const empty = 5 - full - half;
  return '★'.repeat(full) + (half ? '☆' : '') + '☆'.repeat(Math.max(0, empty - (half ? 0 : 0)));
}

function getBarGradient(score) {
  if (score >= 80) return 'linear-gradient(90deg, #ff6b9d, #c8a2f8)';
  if (score >= 60) return 'linear-gradient(90deg, #7dd3c0, #73b4ff)';
  if (score >= 40) return 'linear-gradient(90deg, #ffd166, #ff8a80)';
  return 'linear-gradient(90deg, #90a4ae, #b0bec5)';
}

function getWeekNumber(date) {
  const start = new Date(date.getFullYear(), 0, 1);
  const diff = (date - start + (start.getTimezoneOffset() - date.getTimezoneOffset()) * 60000) / 86400000;
  return Math.ceil((diff + start.getDay() + 1) / 7);
}

  const myElem = zodiacElements[data.systems.zodiac.name] || '火';
  const pElem = zodiacElements[pZodiac.name] || '火';
  const elemCompat = {

    '風火':85,'風地':55,'風風':70,'風水':45,

  const bloodCompat = {
    'AA':75,'AB':65,'AO':80,'AAB':70,
    'BA':55,'BB':75,'BO':70,'BAB':85,
    'OA':80,'OB':70,'OO':70,'OAB':60,

    { key: 'love', name: '恋愛相性', emoji: '💕', weight: [0.15, 0.35, 0.15, 0.2, 0.15] },
    { key: 'friend', name: '友人相性', emoji: '🤝', weight: [0.2, 0.15, 0.3, 0.15, 0.2] },

  const bases = [elemBase, bloodBase, mikkyoBase, numBase, 60 + Math.floor(rng() * 30)];
  const scores = {};

  };

  categories.forEach(cat => {

    cat.weight.forEach((w, i) => raw += bases[i] * w);

    scores[cat.key] = Math.max(30, Math.min(100, Math.round(raw)));

  // Generate advice
  const adviceTemplates = [
    `${data.systems.zodiac.symbol}${data.systems.zodiac.name}と${pZodiac.symbol}${pZodiac.name}の組み合わせは、${myElem}と${pElem}のエネルギーが交わります。`,

    `密教占星術では「${data.systems.mikkyo.mansion.name}」と「${pMikkyo.mansion.name}」の宿の組み合わせ。${mikkyoBase >= 75 ? '前世からの深い縁を感じます' : '互いに新しい発見がある関係です'}。`,

        <div class="cs-comment">${commentArr[ci]}</div>

  html += '</div>';
  html += `<div class="compat-advice"><p>${adviceText}</p></div>`;

  // Store compatibility data for share
  window._compatData = { scores, myZodiac: data.systems.zodiac, pZodiac, myBlood, pBlood };

  // Update URL with partner params
  const currentParams = new URLSearchParams(location.search);
  currentParams.set('partner_birth', partnerBirthdayEl.value.replace(/-/g, ''));

  resultDiv.scrollIntoView({ behavior: 'smooth' });

// ==================== Monthly Fortune Graph (2026年月別運気グラフ) ====================
let monthlyChartInstance = null;

function renderMonthlyGraph(systems, year, month, day, bloodType) {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const datasets = [
    { label: '総合運', key: 'overall', color: '#c8a2f8', data: [] },
    { label: '恋愛運', key: 'love', color: '#ff6b9d', data: [] },
    { label: '仕事運', key: 'work', color: '#73b4ff', data: [] },
    { label: '金運', key: 'money', color: '#ffd166', data: [] }
  ];

  // Generate monthly scores
  for (let m = 1; m <= 12; m++) {
    datasets.forEach(ds => {
      const seed = hashStr(`monthly-2026-${m}-${ds.key}-${year}${month}${day}-${bloodType}`);
      const rng = seededRandom(seed);
      const zodiacFactor = hashStr(systems.zodiac.name + '-' + m) % 20;
      const nineStarFactor = hashStr(systems.nineStar.name + '-' + m) % 15;
      const mikkyoFactor = hashStr(systems.mikkyo.mansion.name + '-' + m) % 12;
      const base = 45 + zodiacFactor + nineStarFactor / 2 + mikkyoFactor / 3;
      const score = Math.max(30, Math.min(100, Math.round(base + rng() * 25 - 5)));
      ds.data.push(score);
    });
  }

  // Find peak and low months for overall
  const overallData = datasets[0].data;
  const peakMonth = overallData.indexOf(Math.max(...overallData)) + 1;
  const lowMonth = overallData.indexOf(Math.min(...overallData)) + 1;

  // Destroy previous chart
  if (monthlyChartInstance) {
    monthlyChartInstance.destroy();
    monthlyChartInstance = null;
  }

  // Render Chart.js
  const ctx = document.getElementById('monthlyChart').getContext('2d');
  monthlyChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: months,
      datasets: datasets.map(ds => ({
        label: ds.label,
        data: ds.data,
        borderColor: ds.color,
        backgroundColor: ds.color + '22',
        borderWidth: 2.5,
        pointRadius: 4,
        pointBackgroundColor: ds.color,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        tension: 0.3,
        fill: false
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, font: { family: "'Zen Maru Gothic', sans-serif", size: 12 } } },
        tooltip: {
          backgroundColor: 'rgba(74,56,96,0.9)',
          titleFont: { family: "'Zen Maru Gothic', sans-serif" },
          bodyFont: { family: "'Zen Maru Gothic', sans-serif" },
          callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + ctx.parsed.y + '点'; } }
        }
      },
      scales: {
        y: { min: 20, max: 100, ticks: { stepSize: 10, font: { size: 11 } }, grid: { color: 'rgba(200,162,248,0.1)' } },
        x: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(200,162,248,0.05)' } }
      }
    }
  });

  // Highlight text
  const highlight = document.getElementById('monthlyHighlight');
  highlight.innerHTML = `
    <h3>📊 2026年 運勢ハイライト</h3>
    <p>🌟 <strong>最高の月: ${peakMonth}月</strong>（総合${overallData[peakMonth - 1]}点）— この時期に大きな決断や新しいチャレンジを！</p>
    <p>⚠️ <strong>注意の月: ${lowMonth}月</strong>（総合${overallData[lowMonth - 1]}点）— 無理せず充電期間として過ごすのが吉。</p>
    <p>💕 恋愛が最も好調なのは<strong>${datasets[1].data.indexOf(Math.max(...datasets[1].data)) + 1}月</strong>、仕事運のピークは<strong>${datasets[2].data.indexOf(Math.max(...datasets[2].data)) + 1}月</strong>です。</p>
  `;

  // Show the card
  document.getElementById('monthlyGraphCard').classList.add('active');
}
